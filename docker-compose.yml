services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: eaglevision-kafka
    hostname: kafka
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: "${KAFKA_NODE_ID:-1}"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - eaglevision

  kafka-init:
    image: apache/kafka:3.8.1
    container_name: eaglevision-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-eu", "-c"]
    command:
      - |
        while read -r topic; do
          [ -z "$$topic" ] && continue
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1
        done < /topics/topics.txt
    volumes:
      - ./src/dev/kafka:/topics:ro
    networks:
      - eaglevision
    restart: "no"

  postgres:
    image: postgres:16
    container_name: eaglevision-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-eaglevision}"
      POSTGRES_USER: "${POSTGRES_USER:-eaglevision}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-eaglevision}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eaglevision} -d ${POSTGRES_DB:-eaglevision}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/dev/db:/docker-entrypoint-initdb.d:ro
    networks:
      - eaglevision

  video-ingestion:
    build:
      context: ./src/services/video_ingestion_service
    container_name: eaglevision-video-ingestion
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  cv-processing:
    build:
      context: ./src/services/cv_processing_service
    container_name: eaglevision-cv-processing
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  state-manager:
    build:
      context: ./src/services/state_manager_service
    container_name: eaglevision-state-manager
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  analytics:
    build:
      context: ./src/services/analytics_service
    container_name: eaglevision-analytics
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  api-gateway:
    build:
      context: ./src
      dockerfile: services/api_gateway_service/Dockerfile
    container_name: eaglevision-api-gateway
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
    networks:
      - eaglevision

  app:
    profiles:
      - app
    build:
      context: ./app
    container_name: eaglevision-app
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: "http://localhost:${GATEWAY_PORT:-8000}"
    networks:
      - eaglevision

volumes:
  kafka_data:
  postgres_data:

networks:
  eaglevision:
    driver: bridge

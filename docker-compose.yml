services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: eaglevision-kafka
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_CFG_NODE_ID: "${KAFKA_NODE_ID:-1}"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9092}"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_KRAFT_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - eaglevision

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: eaglevision-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "while read -r topic; do
         if [ -n \"$$topic\" ]; then
           /opt/bitnami/kafka/bin/kafka-topics.sh
             --bootstrap-server kafka:29092
             --create
             --if-not-exists
             --topic \"$$topic\"
             --partitions 1
             --replication-factor 1;
         fi;
       done < /topics/topics.txt"
    volumes:
      - ./src/dev/kafka:/topics:ro
    networks:
      - eaglevision
    restart: "no"

  postgres:
    image: postgres:16
    container_name: eaglevision-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-eaglevision}"
      POSTGRES_USER: "${POSTGRES_USER:-eaglevision}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-eaglevision}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eaglevision} -d ${POSTGRES_DB:-eaglevision}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - eaglevision

  video-ingestion:
    build:
      context: ./src/services/video_ingestion_service
    container_name: eaglevision-video-ingestion
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  cv-processing:
    build:
      context: ./src/services/cv_processing_service
    container_name: eaglevision-cv-processing
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  state-manager:
    build:
      context: ./src/services/state_manager_service
    container_name: eaglevision-state-manager
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  analytics:
    build:
      context: ./src/services/analytics_service
    container_name: eaglevision-analytics
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  api-gateway:
    build:
      context: ./src/services/api_gateway_service
    container_name: eaglevision-api-gateway
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://eaglevision:eaglevision@postgres:5432/eaglevision}"
    networks:
      - eaglevision

  app:
    build:
      context: ./app
    container_name: eaglevision-app
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - eaglevision

volumes:
  kafka_data:
  postgres_data:

networks:
  eaglevision:
    driver: bridge
